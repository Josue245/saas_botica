services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: botica_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - botica_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: botica_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - botica_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: botica_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saas_botica
      MYSQL_ROOT_PASSWORD: root_local_only
      MYSQL_USER: botica
      MYSQL_PASSWORD: botica_local_only
    ports:
      - "3306:3306"
    volumes:
      - botica_mysql_data:/var/lib/mysql
    networks:
      - botica_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_local_only"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql_testing:
    image: mysql:8.0
    container_name: botica_mysql_testing
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saas_botica_testing
      MYSQL_ROOT_PASSWORD: root_local_only
      MYSQL_USER: botica
      MYSQL_PASSWORD: botica_local_only
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql   # BD de tests en memoria: rápida y se reinicia sola
    networks:
      - botica_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_local_only"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: botica_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - botica_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: botica_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI web para ver correos de prueba
      - "1025:1025"
    networks:
      - botica_net

networks:
  botica_net:
    driver: bridge

volumes:
  botica_mysql_data:
